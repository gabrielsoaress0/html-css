<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="card-container">
        <div class="card-image">
            <div class="overlay"></div>
            <img src="images/image-header-mobile.jpg" alt="Pessoas trabalhando no escritório">
        </div>

        <section class="card-content">
            <h1 class="card-title">
                Get <span class="highlight">insights</span> that help your business grow.
            </h1>
            
            <p class="card-description">
                Discover the benefits of data analytics and make better decisions 
                regarding revenue, customer experience, and overall efficiency.
            </p>

            <div class="card-stats">
                <div class="stat-item">
                    <span class="stat-number">10k+</span>
                    <span class="stat-label">companies</span>
                </div>
                
                <div class="stat-item">
                    <span class="stat-number">314</span>
                    <span class="stat-label">templates</span>
                </div>
                
                <div class="stat-item">
                    <span class="stat-number">12M+</span>
                    <span class="stat-label">queries</span>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
